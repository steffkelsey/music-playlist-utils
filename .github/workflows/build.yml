on: [push, pull_request]
name: Build
permissions:
  contents: read
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go/go.mod'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          working-directory: ./go
  build:
    runs-on: ubuntu-latest
    needs: ["golangci"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: './go/go.mod'
          check-latest: true
          cache: true
      - name: Test
        run: |
          export PATH=$PATH:$HOME/bin:$HOME/go/bin
          ./go/make test
